<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15162f"/>
      <stop offset="0.42" stop-color="#3a2a63"/>
      <stop offset="0.7" stop-color="#b04a7e"/>
      <stop offset="0.88" stop-color="#ff7c47"/>
      <stop offset="1" stop-color="#ffb361"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.8" cy="0.78" r="0.55">
      <stop offset="0" stop-color="#ffe1ab" stop-opacity="0.95"/>
      <stop offset="0.38" stop-color="#ff9a52" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ff9a52" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86f5a6"/>
      <stop offset="1" stop-color="#34d488"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#sun)"/>

  <!-- stars, top band -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="120" cy="70" r="1.6"/><circle cx="300" cy="48" r="1.2"/><circle cx="470" cy="92" r="1.5"/>
    <circle cx="640" cy="56" r="1.1"/><circle cx="820" cy="80" r="1.4"/><circle cx="980" cy="44" r="1.2"/>
    <circle cx="1090" cy="96" r="1.5"/><circle cx="210" cy="120" r="1.1"/>
  </g>

  <!-- horizon track ribbon -->
  <path d="M-20 566 Q 320 506 640 544 T 1220 524 L 1220 650 L -20 650 Z" fill="#180f2b" opacity="0.6"/>
  <path d="M-20 582 Q 340 524 660 560 T 1220 546" fill="none" stroke="#ffd3a3" stroke-opacity="0.55" stroke-width="3" stroke-dasharray="2 26" stroke-linecap="round"/>

  <!-- wordmark -->
  <g transform="translate(80,94)">
    <g transform="translate(0,-26)">
      <rect x="0" y="0" width="40" height="40" rx="9" fill="#ffffff" opacity="0.14"/>
      <g fill="#ffffff">
        <rect x="9" y="9" width="7.5" height="7.5"/><rect x="24" y="9" width="7.5" height="7.5"/>
        <rect x="16.5" y="16.5" width="7.5" height="7.5"/>
        <rect x="9" y="24" width="7.5" height="7.5"/><rect x="24" y="24" width="7.5" height="7.5"/>
      </g>
    </g>
    <text x="58" y="6" font-size="40" font-weight="800" fill="#ffffff" letter-spacing="-1.2">GripCast</text>
  </g>

  <!-- headline -->
  <text x="80" y="312" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2.5">Is today good</text>
  <text x="80" y="398" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2.5">for karting?</text>
  <text x="84" y="456" font-size="29" font-weight="500" fill="#ffffff" opacity="0.82">Live weather → grip, pace &amp; comfort — scored 0–10, any circuit.</text>

  <!-- score gauge -->
  <g transform="translate(978,250)">
    <circle r="132" fill="#0d0a1c" opacity="0.32"/>
    <circle r="116" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="14"/>
    <circle r="116" fill="none" stroke="url(#ring)" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="612 729" transform="rotate(-90)"/>
    <text x="0" y="14" text-anchor="middle" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-3">8.4</text>
    <text x="0" y="58" text-anchor="middle" font-size="26" font-weight="700" fill="#86f5a6" letter-spacing="4">/ 10</text>
    <text x="0" y="-54" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff" opacity="0.6" letter-spacing="5">CONDITIONS</text>
  </g>

  <!-- footer url -->
  <text x="80" y="566" font-size="27" font-weight="700" fill="#ffffff" opacity="0.95" letter-spacing="0.3">grip.henryzh.dev</text>
</svg>
