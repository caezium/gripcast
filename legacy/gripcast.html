<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>GripCast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --sky1:#1a1a28; --sky2:#222238; --sky3:#191926; --sky4:#15151f;
    --cloud: 117,117,132;
    --glass-grad: linear-gradient(160deg, rgba(255,255,255,.6), rgba(190,215,240,.32) 40%, rgba(160,200,240,.26) 60%, rgba(255,255,255,.55));
    --glass-shadow: rgba(255,255,255,.35) 0 -1px 0, rgba(60,120,180,.18) 0 2px 8px;
    /* score gradients by mood (dark-sky) */
    --sg-hot: linear-gradient(160deg, rgba(190,255,214,.78), rgba(70,220,150,.45) 50%, rgba(205,255,228,.72));
    --sg-good:linear-gradient(160deg, rgba(202,252,228,.72), rgba(110,206,176,.42) 50%, rgba(214,250,236,.66));
    --sg-mid: linear-gradient(160deg, rgba(255,238,196,.74), rgba(232,188,104,.44) 50%, rgba(255,234,192,.68));
    --sg-low: linear-gradient(160deg, rgba(226,229,238,.66), rgba(150,158,176,.36) 50%, rgba(221,226,236,.6));
    --sg-wet: linear-gradient(160deg, rgba(198,220,255,.74), rgba(112,158,222,.46) 50%, rgba(206,226,255,.66));
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
    --ink:#fff; --dim:rgba(255,255,255,.5); --dimmer:rgba(255,255,255,.32);
    --panel: rgba(22,22,26,.74); --panelBorder: rgba(255,255,255,.13);
    --accent: 127,176,224;
  }
  body.light-sky {
    --glass-grad: linear-gradient(160deg, rgba(20,28,40,.92), rgba(30,45,70,.8) 45%, rgba(20,30,50,.78) 60%, rgba(10,18,32,.95));
    --glass-shadow: rgba(255,255,255,.4) 0 1px 1px, rgba(20,40,70,.18) 0 1px 4px;
    --sg-hot: linear-gradient(160deg, rgba(13,92,56,.96), rgba(20,140,86,.85) 50%, rgba(8,74,46,.96));
    --sg-good:linear-gradient(160deg, rgba(18,96,72,.95), rgba(30,140,108,.82) 50%, rgba(12,80,60,.95));
    --sg-mid: linear-gradient(160deg, rgba(120,82,18,.95), rgba(160,112,30,.85) 50%, rgba(104,70,14,.96));
    --sg-low: linear-gradient(160deg, rgba(40,48,62,.95), rgba(70,80,98,.85) 50%, rgba(32,40,54,.96));
    --sg-wet: linear-gradient(160deg, rgba(20,52,96,.96), rgba(34,86,150,.85) 50%, rgba(14,40,80,.96));
    --ink:#16202e; --dim:rgba(20,30,45,.62); --dimmer:rgba(20,30,45,.42);
    --panel: rgba(250,251,253,.84); --panelBorder: rgba(20,30,50,.14);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    font-family:var(--sans); color:var(--ink); min-height:100%;
    overflow:hidden; -webkit-font-smoothing:antialiased; position:relative; user-select:none;
    transition: color 1.4s ease;
  }
  #sky { position:fixed; inset:0; z-index:0; background:linear-gradient(175deg, var(--sky1), var(--sky2) 45%, var(--sky3) 72%, var(--sky4)); transition: background 1.8s ease; }
  .cloud-layer { position:fixed; inset:0; z-index:1; overflow:hidden; pointer-events:none; }
  .cloud-blob { position:absolute; border-radius:50%; background:rgba(var(--cloud),.42); will-change:transform; transition:background 1.6s ease; }
  #fx { position:fixed; inset:0; z-index:2; pointer-events:none; }
  .vignette { position:fixed; inset:0; z-index:2; pointer-events:none; background:radial-gradient(ellipse at 50% 40%, transparent 42%, rgba(0,0,0,.26) 100%); transition:opacity 1.4s ease; }
  body.light-sky .vignette { opacity:.3; }

  .stage { position:relative; z-index:3; height:100vh; display:flex; flex-direction:column; }
  .topbar { display:flex; align-items:flex-start; justify-content:space-between; padding:30px 38px 0; font-family:var(--mono); font-size:14px; }
  .topleft { display:flex; align-items:center; gap:12px; }
  .globe { font-family:var(--mono); font-size:13px; color:var(--dim); background:transparent; border:none; cursor:pointer; padding:0; transition:color .2s ease; }
  .globe:hover { color:var(--ink); }
  .topbar .date { color:var(--dim); }
  .topbar .mid { color:var(--dim); text-align:center; font-size:13px; }
  .topbar .clock { color:var(--dim); display:flex; gap:9px; align-items:baseline; }
  .topbar .clock .tz { color:var(--dimmer); font-size:11px; }
  .topbar .clock .cd { color:var(--ink); opacity:.8; }
  .topbar .clock .cdlabel { color:var(--dimmer); }

  .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px; padding-bottom:54px; }
  .place { position:relative; font-size:24px; font-weight:500; letter-spacing:-.01em; cursor:pointer;
    background:var(--glass-grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:var(--glass-shadow); transition:opacity .25s ease; display:inline-flex; align-items:center; gap:8px; }
  .place:hover { opacity:.8; }
  .place .chev { -webkit-text-fill-color:var(--dim); font-size:13px; }
  .score { font-weight:900; font-size:118px; line-height:1; letter-spacing:4px; cursor:default;
    background-image:var(--glass-grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:var(--glass-shadow); transition:background-image 1.2s ease; }
  .score.m-hot{ background-image:var(--sg-hot); background-size:220% 100%; animation:sheen 7s ease-in-out infinite; }
  .score.m-good{ background-image:var(--sg-good); background-size:220% 100%; animation:sheen 9s ease-in-out infinite; }
  .score.m-mid{ background-image:var(--sg-mid); }
  .score.m-low{ background-image:var(--sg-low); }
  .score.m-wet{ background-image:var(--sg-wet); text-shadow:rgba(150,190,240,.4) 0 0 18px, var(--glass-shadow); }
  @keyframes sheen{ 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }
  .score .den { letter-spacing:0; }
  .tagline { font-size:23px; font-weight:500; background:var(--glass-grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-shadow:var(--glass-shadow); }
  .stats { display:flex; gap:28px; margin-top:6px; font-family:var(--mono); font-size:13px; color:var(--dim); opacity:0; transition:opacity .6s ease; align-items:center; }
  .stats.show { opacity:1; }
  .stats b { color:var(--ink); opacity:.86; font-weight:500; }
  .stats .det { cursor:pointer; }
  .stats .det b { border-bottom:1px dashed var(--dim); padding-bottom:1px; }

  /* hour scrubber */
  .scrub { display:none; flex-direction:column; align-items:center; gap:5px; margin-top:10px; opacity:0; transition:opacity .5s ease; }
  .scrub.show { display:flex; opacity:1; }
  .scrub input[type=range]{ -webkit-appearance:none; appearance:none; width:248px; height:4px; border-radius:99px; background:rgba(128,128,128,.3); outline:none; }
  .scrub input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:rgb(var(--accent)); cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.4); }
  .scrub input[type=range]::-moz-range-thumb{ width:14px; height:14px; border:none; border-radius:50%; background:rgb(var(--accent)); cursor:pointer; }
  .scrub .lab { font-family:var(--mono); font-size:12px; color:var(--dim); display:flex; gap:12px; align-items:center; }
  .scrub .nowbtn { cursor:pointer; color:var(--ink); opacity:.72; border-bottom:1px dashed currentColor; }

  .blurb { position:fixed; left:38px; bottom:32px; z-index:4; max-width:330px; font-family:var(--mono); font-size:12.5px; line-height:1.7; color:var(--dim); }
  .blurb i { font-style:italic; } .blurb u { cursor:pointer; text-underline-offset:2px; }
  .hint { position:fixed; right:38px; bottom:32px; z-index:4; text-align:right; font-family:var(--mono); font-size:12.5px; line-height:1.7; color:var(--dimmer); }
  .hint b { color:var(--dim); cursor:pointer; }

  /* ---------- popups (quick / details / lang / graph) ---------- */
  .popup { position:fixed; z-index:30; min-width:300px; max-width:min(440px,92vw);
    background:var(--panel); border:1px solid var(--panelBorder); border-radius:16px;
    backdrop-filter:blur(28px) saturate(1.6); -webkit-backdrop-filter:blur(28px) saturate(1.6);
    box-shadow:0 18px 50px rgba(0,0,0,.34); display:none; overflow:hidden; }
  .popup.open { display:block; animation:pop .22s ease; }
  @keyframes pop { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
  .popup.up.open { animation:popup .22s ease; }
  @keyframes popup { from{opacity:0; transform:translateY(calc(-100% + 8px));} to{opacity:1; transform:translateY(-100%);} }
  .popup .head { padding:11px 16px 5px; font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--dimmer); }
  .popup .row { display:flex; align-items:center; gap:11px; padding:10px 16px; font-family:var(--mono); font-size:14px; color:var(--ink); cursor:pointer; }
  .popup .row .ic { width:18px; text-align:center; flex:none; opacity:.9; }
  .popup .row .nm { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .popup .row .sub { color:var(--dim); margin-left:auto; padding-left:12px; font-size:12px; flex:none; white-space:nowrap; }
  .popup .row:hover, .popup .row.sel { background:rgba(128,128,128,.16); }

  .wx { padding:8px 16px 14px; }
  .wx .grid { display:grid; grid-template-columns:1fr 1fr; gap:9px 16px; font-family:var(--mono); font-size:13px; }
  .wx .k { color:var(--dim); } .wx .v { color:var(--ink); text-align:right; }
  .wx .bars { margin-top:13px; } .wx .bar { margin-bottom:9px; }
  .wx .bar .lab { display:flex; justify-content:space-between; font-family:var(--mono); font-size:12px; color:var(--dim); margin-bottom:4px; }
  .wx .bar .lab b { color:var(--ink); font-weight:500; }
  .wx .track { height:6px; border-radius:99px; background:rgba(128,128,128,.22); overflow:hidden; }
  .wx .track i { display:block; height:100%; border-radius:99px; width:0; transition:width .7s cubic-bezier(.2,.8,.2,1); }
  .wx .wetcmp { margin-top:13px; display:flex; gap:8px; }
  .wx .wetcmp .c { flex:1; text-align:center; padding:9px 6px; border-radius:10px; background:rgba(128,128,128,.14); font-family:var(--mono); }
  .wx .wetcmp .c .n { font-size:20px; font-weight:700; color:var(--ink); } .wx .wetcmp .c .t { font-size:11px; color:var(--dim); margin-top:2px; }
  .wx .wetcmp .c.active { outline:1.5px solid rgba(128,160,210,.6); }

  /* graph */
  #graph { left:50%; top:auto; transform:translateX(-50%); bottom:84px; width:min(760px,94vw); max-width:none; }
  #graph.open { animation:pop .22s ease; }
  .glegend { display:flex; gap:16px; padding:2px 16px 6px; font-family:var(--mono); font-size:11px; color:var(--dim); }
  .glegend .lg::before { content:"●"; margin-right:4px; }
  .glegend .b::before { color:rgb(var(--accent)); } .glegend .a::before { color:rgba(230,170,90,.95); } .glegend .r::before { color:rgba(120,160,220,.85); }
  .gwrap { padding:0 10px 12px; }
  .gwrap text { font-family:var(--mono); }

  /* ---------- search modal (themed, flips with sky) ---------- */
  .search { position:fixed; inset:0; z-index:40; display:none; align-items:flex-start; justify-content:center; padding-top:12vh;
    background:rgba(8,8,14,.42); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); }
  body.light-sky .search { background:rgba(40,52,72,.34); }
  .search.open { display:flex; }
  .search-box { width:min(580px,92vw); }
  .search-top { display:flex; gap:8px; align-items:center; }
  .input-wrap { position:relative; flex:1; }
  .input-wrap .mag { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--dim); font-size:14px; pointer-events:none; }
  .input-wrap .spin { position:absolute; right:14px; top:50%; transform:translateY(-50%); width:15px; height:15px; border-radius:50%; border:2px solid rgba(128,128,128,.3); border-top-color:rgb(var(--accent)); animation:spin .8s linear infinite; display:none; }
  .input-wrap.loading .spin { display:block; }
  .input-wrap .clr { position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--dim); cursor:pointer; font-size:16px; display:none; }
  .input-wrap.has-val .clr { display:block; } .input-wrap.loading .clr { display:none; }
  @keyframes spin { to { transform:translateY(-50%) rotate(360deg); } }
  #q { width:100%; font-family:var(--mono); font-size:17px; color:var(--ink);
    background:var(--panel); border:1px solid var(--panelBorder); border-radius:14px; padding:15px 40px 15px 38px; outline:none;
    backdrop-filter:blur(24px) saturate(1.6); -webkit-backdrop-filter:blur(24px) saturate(1.6); }
  #q::placeholder { color:var(--dim); }
  .seg { display:inline-flex; gap:2px; padding:3px; border-radius:12px; background:var(--panel); border:1px solid var(--panelBorder); }
  .seg button { font-family:var(--mono); font-size:13px; color:var(--dim); background:transparent; border:none; padding:9px 13px; border-radius:9px; cursor:pointer; }
  .seg button.active { color:var(--ink); background:rgba(128,128,128,.2); }
  .panelbody { margin-top:8px; background:var(--panel); border:1px solid var(--panelBorder); border-radius:16px;
    backdrop-filter:blur(24px) saturate(1.6); -webkit-backdrop-filter:blur(24px) saturate(1.6); overflow:hidden; }
  .sugg { max-height:58vh; overflow-y:auto; color:var(--ink); }
  .sugg .secthead { display:flex; align-items:center; gap:8px; padding:11px 16px 7px; cursor:pointer;
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim);
    position:sticky; top:0; background:var(--panel); backdrop-filter:blur(8px); z-index:1; }
  .sugg .secthead .tw { width:12px; display:inline-block; transition:transform .2s ease; }
  .sugg .secthead.collapsed .tw { transform:rotate(-90deg); }
  .sugg .secthead .cnt { margin-left:auto; color:var(--dimmer); }
  .sugg .secthead .mini { width:13px; height:13px; border:2px solid rgba(128,128,128,.3); border-top-color:rgb(var(--accent)); border-radius:50%; animation:spin2 .8s linear infinite; margin-left:6px; }
  @keyframes spin2 { to { transform:rotate(360deg); } }
  .sugg .sect.collapsed { display:none; }
  .sugg .row { display:flex; align-items:center; gap:11px; padding:11px 16px; font-family:var(--mono); font-size:14px; color:var(--ink); cursor:pointer; }
  .sugg .row .ic { width:18px; text-align:center; flex:none; opacity:.92; }
  .sugg .row .nm { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sugg .row .sub { color:var(--dim); margin-left:auto; padding-left:12px; font-size:12px; flex:none; white-space:nowrap; }
  .sugg .row .dist { color:rgb(var(--accent)); margin-left:auto; padding-left:12px; font-size:12px; flex:none; }
  .sugg .row:hover, .sugg .row.sel { background:rgba(128,128,128,.14); }
  .sugg .row.geo { color:rgb(var(--accent)); }
  .sugg .empty { padding:16px; font-family:var(--mono); font-size:13px; color:var(--dim); }
  .sugg::-webkit-scrollbar { width:8px; } .sugg::-webkit-scrollbar-thumb { background:rgba(128,128,128,.3); border-radius:8px; }
  #map { height:60vh; width:100%; display:none; background:#11131a; }
  .panelbody.mapmode #map { display:block; } .panelbody.mapmode .sugg { display:none; }
  .leaflet-container { background:#11131a; font-family:var(--mono); }
  .mk { font-size:18px; filter:drop-shadow(0 2px 3px rgba(0,0,0,.5)); cursor:pointer; }
  .maphint { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); z-index:500; font-family:var(--mono); font-size:11px; color:rgba(255,255,255,.7); background:rgba(0,0,0,.55); padding:5px 12px; border-radius:8px; display:flex; gap:7px; align-items:center; }
  .maphint .ms { width:11px; height:11px; border:2px solid rgba(255,255,255,.3); border-top-color:#9cc; border-radius:50%; animation:spin2 .8s linear infinite; display:none; }
  .maphint.loading .ms { display:inline-block; }

  /* timeline */
  .timeline { position:fixed; left:50%; bottom:84px; transform:translateX(-50%); z-index:5; display:none; gap:0; align-items:flex-end;
    background:var(--panel); border:1px solid var(--panelBorder); border-radius:14px; padding:8px 8px 6px;
    backdrop-filter:blur(24px) saturate(1.6); -webkit-backdrop-filter:blur(24px) saturate(1.6); max-width:92vw; overflow-x:auto; }
  .timeline.open { display:flex; }
  .tl-day { display:flex; flex-direction:column; align-items:center; gap:4px; padding:4px 6px; cursor:pointer; border-radius:9px; flex:none; }
  .tl-day:hover { background:rgba(128,128,128,.16); }
  .tl-day.sel { background:rgba(127,176,224,.28); }
  .tl-day .bar { width:6px; border-radius:3px; background:rgb(var(--accent)); opacity:.75; }
  .tl-day .d { font-family:var(--mono); font-size:10px; color:var(--dim); white-space:nowrap; }
  .tl-day.today .d { color:var(--ink); }
  .timeline::-webkit-scrollbar { height:6px; } .timeline::-webkit-scrollbar-thumb { background:rgba(128,128,128,.3); border-radius:6px; }

  .fade { animation:fade .8s ease; } @keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  @media (max-width:640px){
    .topbar{ padding:22px 16px 0; } .score{ font-size:78px; }
    .blurb{ left:16px; bottom:86px; max-width:62vw; font-size:11px; } .hint{ display:none; }
    .sugg .row .sub{ display:none; } #map{ height:54vh; } #graph{ bottom:78px; }
  }
</style>
</head>
<body>
  <div id="sky"></div>
  <div class="cloud-layer" id="clouds"></div>
  <canvas id="fx"></canvas>
  <div class="vignette"></div>
  <svg width="0" height="0" style="position:absolute"><defs>
    <filter id="cw0"><feTurbulence type="fractalNoise" baseFrequency="0.012 0.04" numOctaves="2" seed="7"/><feDisplacementMap in="SourceGraphic" scale="60"/></filter>
    <filter id="cw1"><feTurbulence type="fractalNoise" baseFrequency="0.01 0.05" numOctaves="2" seed="22"/><feDisplacementMap in="SourceGraphic" scale="70"/></filter>
    <filter id="cw2"><feTurbulence type="fractalNoise" baseFrequency="0.014 0.035" numOctaves="2" seed="41"/><feDisplacementMap in="SourceGraphic" scale="55"/></filter>
  </defs></svg>

  <div class="stage">
    <div class="topbar">
      <div class="topleft">
        <button class="globe" id="globe">🌐 <span id="langCode">EN</span></button>
        <span class="date" id="date">—</span>
      </div>
      <div class="mid" id="phaseLabel"></div>
      <div class="clock"><span id="time">--:--</span><span class="tz" id="tz"></span><span class="cd" id="cd"></span><span class="cdlabel" id="cdlabel"></span></div>
    </div>
    <div class="center">
      <div class="place" id="place"><span class="nm">tap to begin</span><span class="chev">▾</span></div>
      <div class="score" id="score">?<span class="den">/10</span></div>
      <div class="tagline" id="tagline" data-t="reading">reading the track…</div>
      <div class="stats" id="stats">
        <span><span class="lab" id="tLab" data-t="nowLbl">now</span> <b id="sTemp">—</b></span>
        <span class="det" id="condDet"><b id="sCond">—</b></span>
        <span><span class="lab" data-t="wind">wind</span> <b id="sWind">—</b></span>
      </div>
      <div class="scrub" id="scrub">
        <input type="range" min="0" max="23" step="1" id="hourRange" value="12" />
        <div class="lab"><span id="hourLab">--:00</span><span class="nowbtn" id="nowBtn" data-t="scrubNow">now</span></div>
      </div>
    </div>
  </div>

  <div class="blurb" data-t-html="blurbHtml">We score <i>track-day potential</i> from grip, air density &amp; <u id="blurbDet">live weather</u>. The clock is physics — the send button is you.</div>
  <div class="hint" data-t-html="hintHtml">click the name for recents · <b id="tlToggle">▣</b> timeline · <b id="graphToggle">📈</b> trends</div>

  <div class="popup" id="quick"></div>
  <div class="popup up" id="details"></div>
  <div class="popup" id="lang"></div>
  <div class="popup" id="graph"></div>

  <div class="search" id="search">
    <div class="search-box">
      <div class="search-top">
        <div class="input-wrap" id="inputWrap">
          <span class="mag">🔍</span>
          <input id="q" type="text" data-t-ph="ph" placeholder="track, city, country, or 'lat, lon'…" autocomplete="off" />
          <span class="spin"></span><span class="clr" id="clr">✕</span>
        </div>
        <div class="seg" id="viewSeg"><button data-v="list" class="active" data-t="list">list</button><button data-v="map" data-t="map">map</button></div>
      </div>
      <div class="panelbody" id="panelbody">
        <div class="sugg" id="sugg"></div>
        <div id="map"><div class="maphint" id="maphint"><span class="ms"></span><span id="maphintTxt">pan the map — circuits load automatically</span></div></div>
      </div>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

/* ============================ weather decode + scoring ============================ */
function decode(code){
  const m={0:["clear",0],1:["mostly clear",0],2:["partly cloudy",0],3:["overcast",0],45:["fog",.2],48:["rime fog",.2],
    51:["light drizzle",.5],53:["drizzle",.6],55:["heavy drizzle",.75],56:["freezing drizzle",.9],57:["freezing drizzle",.95],
    61:["light rain",.7],63:["rain",.85],65:["heavy rain",1],66:["freezing rain",.95],67:["freezing rain",1],
    71:["light snow",.9],73:["snow",.95],75:["heavy snow",1],77:["snow grains",.85],80:["light showers",.7],81:["showers",.85],
    82:["violent showers",1],85:["snow showers",.95],86:["snow showers",1],95:["thunderstorm",1],96:["thunderstorm",1],99:["thunderstorm",1]};
  return m[code]||["unknown",.3];
}
function scoreOf(w, forceWet){
  const [code, realWet] = decode(w.code);
  const wet = forceWet==="wet"?0.9 : forceWet==="dry"?0 : realWet;
  let grip = 1 - wet*0.85;
  if (forceWet!=="dry" && w.precip>0.1) grip -= Math.min(w.precip/8,0.3);
  if (w.temp<5) grip -= (5-w.temp)*0.03;
  if (w.temp>32) grip -= (w.temp-32)*0.02;
  grip = clamp(grip);
  let pace; if (wet>0.4) pace=0.35*(1-wet)+0.15; else { pace = 1 - Math.abs(w.temp-12)/28; }
  pace -= Math.min(Math.max((w.gust||w.wind)-25,0)/60,0.25); pace=clamp(pace);
  let comfort = 1 - Math.abs((w.feels??w.temp)-21)/26 - wet*0.6 - Math.min(w.wind/70,0.3); comfort=clamp(comfort);
  const raw = clamp(grip*0.5+pace*0.28+comfort*0.22);
  const s10 = Math.round(raw*100)/10;
  return {s10, grip, pace, comfort, label:code, ...verdict(s10, wet)};
}
function verdict(s, wet){
  if (wet>=0.5){ return s>=4?{tagline:tg("tags","wet"),mood:"wet"}:{tagline:tg("tags","fullwet"),mood:"wet"}; }
  if (s>=9) return {tagline:tg("tags","send"),mood:"hot"};
  if (s>=7.5) return {tagline:tg("tags","grip"),mood:"good"};
  if (s>=6) return {tagline:tg("tags","good"),mood:"good"};
  if (s>=4.5) return {tagline:tg("tags","ok"),mood:"mid"};
  if (s>=3) return {tagline:tg("tags","patchy"),mood:"low"};
  return {tagline:tg("tags","tough"),mood:"low"};
}

/* ============================ SKY engine ============================ */
const SKIES = {
  night:{stops:["#0c0f1c","#141a30","#1a2138","#10131f"],light:false},
  dawn:{stops:["#27314f","#5b5a7e","#b5859b","#e9b48f"],light:false},
  day:{stops:["#4878a0","#7ac0d8","#b8e0ea","#e8f6fa"],light:true},
  golden:{stops:["#2b3a66","#7a6a8e","#d98f63","#ffce93"],light:false},
  dusk:{stops:["#161d3a","#42375f","#a35d6e","#e0936f"],light:false},
};
const GREY = {
  night:["#10121a","#181a24","#1d2028","#121319"], dawn:["#3a3f4c","#6a6d76","#9a9ba2","#c6c7cb"],
  day:["#6c7783","#97a2ac","#bcc3c9","#dfe3e6"], golden:["#3a3d49","#6e6a72","#9a8e86","#c4b8ad"], dusk:["#1c1e28","#3c3a44","#6a6068","#928a86"],
};
function hexMix(a,b,tt){ const pa=[1,3,5].map(i=>parseInt(a.substr(i,2),16)), pb=[1,3,5].map(i=>parseInt(b.substr(i,2),16));
  return "#"+pa.map((v,i)=>Math.round(v+(pb[i]-v)*tt).toString(16).padStart(2,"0")).join(""); }
function phaseAt(localMin, sr, ss){
  if (sr==null||ss==null){ return (localMin<360||localMin>1200)?"night":"day"; }
  if (localMin < sr-55 || localMin > ss+60) return "night";
  if (localMin < sr+50) return "dawn";
  if (localMin > ss+12) return "dusk";
  if (localMin > ss-55) return "golden";
  return "day";
}
function applySky({phase, cloud=0, precip=0, wind=0, temp=15}){
  const base=SKIES[phase], grey=GREY[phase];
  const ct = clamp(cloud/100,0,1)*0.8 + (precip>0.2?0.2:0);
  let stops = base.stops.map((s,i)=>hexMix(s, grey[i], clamp(ct,0,1)));
  // temperature tint: warm/yellow when hot (horizon), cool blue when cold (top)
  const warm = clamp((temp-20)/18,0,1)*(1-ct*0.5), cool=clamp((6-temp)/16,0,1)*(1-ct*0.5);
  if(warm>0.02){ stops[2]=hexMix(stops[2],"#ffce82",warm*0.5); stops[3]=hexMix(stops[3],"#ffd27a",warm*0.62); stops[1]=hexMix(stops[1],"#ffc878",warm*0.25); }
  if(cool>0.02){ stops[0]=hexMix(stops[0],"#a8c6ff",cool*0.4); stops[1]=hexMix(stops[1],"#bcd2ff",cool*0.3); }
  const r=document.documentElement.style; ["--sky1","--sky2","--sky3","--sky4"].forEach((v,i)=>r.setProperty(v,stops[i]));
  const lightSky = base.light && ct<0.6;
  document.body.classList.toggle("light-sky", lightSky);
  const cc = lightSky ? "235,238,242" : "150,156,170";
  buildClouds(Math.round(2+(cloud/100)*7), wind, cc);
  fxMode(precip>0.05 ? "rain" : (!base.light||ct>=0.6 ? "stars" : "none"), {precip, wind, dark:!lightSky});
  $("#phaseLabel").textContent = tg("phases",phase)||"";
}

/* ============================ clouds ============================ */
function buildClouds(n, wind, cc){
  const layer=$("#clouds"); layer.innerHTML="";
  document.documentElement.style.setProperty("--cloud", cc);
  const W=innerWidth,H=innerHeight;
  const dur = clamp(42 - wind*1.1, 7, 42);   // wind => faster; floor is brisk
  for(let i=0;i<n;i++){
    const b=document.createElement("div"); b.className="cloud-blob";
    const w=480+Math.random()*440, h=46+Math.random()*64;
    b.style.width=w+"px"; b.style.height=h+"px";
    b.style.top=(Math.random()*H*0.92)+"px"; b.style.left=(Math.random()*W - w*0.3)+"px";
    b.style.opacity=(0.26+Math.random()*0.2).toFixed(2);
    b.style.filter=`url(#cw${i%3}) blur(${(11+Math.random()*5).toFixed(1)}px)`;
    const dx=180+Math.random()*240, d=dur*(0.8+Math.random()*0.5);
    b.animate([{transform:`translateX(${-dx}px)`},{transform:`translateX(${dx}px)`}],
      {duration:d*1000, direction:"alternate", iterations:Infinity, easing:"linear", delay:-Math.random()*d*1000});
    layer.appendChild(b);
  }
}

/* ============================ fx: stars / rain ============================ */
const fx = (()=>{
  const c=$("#fx"), x=c.getContext("2d"); let w,h,dpr,mode="none",opt={},items=[];
  function resize(){ dpr=devicePixelRatio||1; w=c.width=innerWidth*dpr; h=c.height=innerHeight*dpr; c.style.width=innerWidth+"px"; c.style.height=innerHeight+"px"; seed(); }
  function seed(){
    if(mode==="stars"){ items=Array.from({length:Math.min(90,Math.floor(innerWidth/16))},()=>({x:Math.random()*w,y:Math.random()*h*0.85,r:(Math.random()*1.5+0.3)*dpr,a:Math.random()*0.6+0.2,tw:Math.random()*7})); }
    else if(mode==="rain"){ const dens=Math.min(520,Math.floor((opt.precip||1)*120+140)); items=Array.from({length:dens},()=>mkDrop()); }
    else items=[];
  }
  function mkDrop(){ const slant=clamp((opt.wind||0)/35,0,1.4); return {x:Math.random()*w*1.2-w*0.1,y:Math.random()*h,len:(16+Math.random()*22)*dpr,sp:(11+Math.random()*9+(opt.precip||0))*dpr,slant}; }
  function frame(){
    x.clearRect(0,0,w,h);
    if(mode==="stars"){ for(const s of items){ s.tw+=0.03; const a=s.a*(0.55+0.45*Math.sin(s.tw)); x.beginPath(); x.arc(s.x,s.y,s.r,0,7); x.fillStyle=`rgba(255,255,255,${a})`; x.fill(); } }
    else if(mode==="rain"){ x.strokeStyle=opt.dark?"rgba(190,208,238,.6)":"rgba(90,120,160,.5)"; x.lineWidth=1.7*dpr; x.lineCap="round";
      for(const d of items){ x.beginPath(); x.moveTo(d.x,d.y); x.lineTo(d.x+d.slant*d.len,d.y+d.len); x.stroke(); d.y+=d.sp; d.x+=d.slant*d.sp*0.5; if(d.y>h){ d.y=-d.len; d.x=Math.random()*w*1.2-w*0.1; } } }
    requestAnimationFrame(frame);
  }
  addEventListener("resize",resize); resize(); frame();
  return { set(m,o){ mode=m; opt=o||{}; seed(); } };
})();
function fxMode(m,o){ fx.set(m,o); }

/* ============================ track-local time ============================ */
function trackNow(){ const off=state.tzOffset||0; const d=new Date(Date.now()+off*1000);
  return { h:d.getUTCHours(), m:d.getUTCMinutes(), s:d.getUTCSeconds(), min:d.getUTCHours()*60+d.getUTCMinutes(), dateISO:d.toISOString().slice(0,10) }; }
function minFromISO(iso){ if(!iso) return null; const tt=iso.split("T")[1]; if(!tt) return null; const [h,m]=tt.split(":"); return +h*60+ +m; }

function clockTick(){
  const p=trackNow();
  $("#time").textContent = state.data ? pad(p.h)+":"+pad(p.m) : "--:--";
  $("#tz").textContent = state.data ? (state.tzAbbr||"") : "";
  const d=state.data;
  if(!d){ $("#cd").textContent=""; $("#cdlabel").textContent=""; return; }
  if(state.live){
    const hd=state.hourlyCache[state.todayISO];
    if(hd&&hd.code.length){
      const grips=hd.code.map((_,i)=>scoreOf(hourW(hd,i)).s10);
      let bestI=-1,bestG=-1; for(let i=p.h+1;i<24;i++){ if(grips[i]>bestG){bestG=grips[i];bestI=i;} }
      const nowG=grips[p.h]??0;
      if(bestI>=0 && bestG>nowG+0.15){
        const sec=((bestI*60)-p.min)*60 - p.s;
        $("#cd").textContent=`${pad(Math.floor(sec/3600))}:${pad(Math.floor(sec/60)%60)}:${pad(sec%60)}`;
        $("#cdlabel").textContent=t("toPeak");
      } else { $("#cd").textContent="✓"; $("#cdlabel").textContent=t("peakNow"); }
      return;
    }
    // fallback: sun countdown
    const sr=d.daily.sunrise[d.todayIdx], ss=d.daily.sunset[d.todayIdx], nowMs=Date.now();
    const srMs=new Date(sr+"Z").getTime()-state.tzOffset*1000, ssMs=new Date(ss+"Z").getTime()-state.tzOffset*1000;
    let target=null,label=""; if(nowMs<srMs){target=srMs;label=t("toSunrise");} else if(nowMs<ssMs){target=ssMs;label=t("toSunset");}
    if(target){ let s=Math.max(0,Math.floor((target-nowMs)/1000)); $("#cd").textContent=`${pad(Math.floor(s/3600))}:${pad(Math.floor(s/60)%60)}:${pad(s%60)}`; $("#cdlabel").textContent=label; }
    else { $("#cd").textContent=""; $("#cdlabel").textContent=""; }
  } else {
    // day view: show that day's peak hour
    const hd=state.hourlyCache[state.selDate];
    if(hd&&hd.code.length){ const ph=peakHour(hd); $("#cd").textContent=pad(ph)+":00"; $("#cdlabel").textContent=t("peakGrip"); }
    else { $("#cd").textContent=""; $("#cdlabel").textContent=""; }
  }
}
setInterval(clockTick,1000);
function setDateLabel(ds){ $("#date").textContent=new Date((ds||new Date().toISOString().slice(0,10))+"T00:00").toLocaleDateString(lang,{month:"short",day:"numeric"}); }
setDateLabel();

/* ============================ data fetch + caching ============================ */
const wxCache=new Map();
function lsGet(k){ try{const v=JSON.parse(localStorage.getItem(k)); if(v&&Date.now()-v.t<v.ttl) return v.d;}catch{} return null; }
function lsSet(k,d,ttl){ try{localStorage.setItem(k,JSON.stringify({t:Date.now(),ttl,d}));}catch{} }

async function fetchWeather(lat,lon){
  const k=lat.toFixed(2)+","+lon.toFixed(2); const c=wxCache.get(k); if(c&&Date.now()-c.t<600000) return c.j;
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    +`&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,cloud_cover,surface_pressure,wind_speed_10m,wind_gusts_10m,wind_direction_10m,is_day`
    +`&daily=sunrise,sunset,weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max`
    +`&past_days=60&forecast_days=14&wind_speed_unit=kmh&timezone=auto`;
  const j=await (await fetch(url)).json();
  wxCache.set(k,{t:Date.now(),j}); return j;
}
async function fetchHourly(lat,lon,date){
  if(state.hourlyCache[date]) return state.hourlyCache[date];
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    +`&hourly=temperature_2m,apparent_temperature,precipitation,weather_code,cloud_cover,wind_speed_10m,wind_gusts_10m,relative_humidity_2m,surface_pressure`
    +`&start_date=${date}&end_date=${date}&wind_speed_unit=kmh&timezone=auto`;
  const H=(await (await fetch(url)).json()).hourly||{};
  const o={ time:H.time||[], temp:H.temperature_2m||[], feels:H.apparent_temperature||[], precip:H.precipitation||[], code:H.weather_code||[],
    cloud:H.cloud_cover||[], wind:H.wind_speed_10m||[], gust:H.wind_gusts_10m||[], humidity:H.relative_humidity_2m||[], pressure:H.surface_pressure||[] };
  state.hourlyCache[date]=o; return o;
}
function liveW(d){ const c=d.current; return { temp:c.temperature_2m, feels:c.apparent_temperature, wind:c.wind_speed_10m, gust:c.wind_gusts_10m, precip:c.precipitation, code:c.weather_code, cloud:c.cloud_cover, humidity:c.relative_humidity_2m, pressure:c.surface_pressure, dir:c.wind_direction_10m }; }
function hourW(hd,i){ return { temp:hd.temp[i], feels:hd.feels[i], wind:hd.wind[i], gust:hd.gust[i], precip:hd.precip[i], code:hd.code[i], cloud:hd.cloud[i], humidity:hd.humidity[i], pressure:hd.pressure[i] }; }
function dayW(d,i){ const dl=d.daily; const tmid=(dl.temperature_2m_max[i]+dl.temperature_2m_min[i])/2;
  return { temp:tmid, feels:tmid, wind:dl.wind_speed_10m_max[i], gust:dl.wind_gusts_10m_max[i], precip:(dl.precipitation_probability_max[i]>50?1:0)*decode(dl.weather_code[i])[1], code:dl.weather_code[i], cloud:decode(dl.weather_code[i])[1]*70 }; }
function peakHour(hd){ let bi=12,bg=-1; for(let i=0;i<hd.code.length;i++){ const g=scoreOf(hourW(hd,i)).s10; if(g>bg){bg=g;bi=i;} } return bi; }

/* ============================ render ============================ */
let lastScore=null, lastW=null;
async function loadPlace(lat,lon,name){
  state.lat=lat; state.lon=lon; state.name=name; state.hourlyCache={};
  $("#place").querySelector(".nm").textContent=name;
  $("#score").innerHTML=`?<span class="den">/10</span>`; $("#tagline").textContent=t("reading");
  try{
    const d=await fetchWeather(lat,lon); state.data=d;
    state.tzOffset=d.utc_offset_seconds||0; state.tzAbbr=d.timezone_abbreviation||"";
    state.todayISO=trackNow().dateISO;
    let ti=(d.daily?.time||[]).indexOf(state.todayISO); if(ti<0) ti=60; state.todayIdx=ti;
    pushRecent({name,lat,lon}); lsSet("gc_last",{name,lat,lon},1e12);
    setLive();
    buildTimeline();
    fetchHourly(lat,lon,state.todayISO).then(()=>{ updateScrub(); clockTick(); });
  }catch(e){ $("#tagline").textContent=t("noCond"); }
}
function setLive(){ const p=trackNow(); state.live=true; state.selDate=state.todayISO; state.selHour=p.h; renderState(); }
function selectDay(i){
  const d=state.data; if(!d) return;
  if(i===state.todayIdx){ setLive(); buildTimeline(); return; }
  const date=d.daily.time[i]; state.live=false; state.selDate=date;
  fetchHourly(state.lat,state.lon,date).then(hd=>{ state.selHour=peakHour(hd); renderState(); updateScrub(); buildTimeline(); });
}
function setHour(h){ state.selHour=h; const p=trackNow(); state.live=(state.selDate===state.todayISO && h===p.h);
  if(state.live){ renderState(); updateScrub(); return; }
  fetchHourly(state.lat,state.lon,state.selDate).then(()=>{ renderState(); updateScrub(); }); }
function currentW(){
  if(state.live) return liveW(state.data);
  const hd=state.hourlyCache[state.selDate]; if(!hd||!hd.code.length) return liveW(state.data);
  return hourW(hd,state.selHour);
}
function renderState(){
  const d=state.data; if(!d) return;
  const w=currentW(); lastW=w;
  const idx=d.daily.time.indexOf(state.selDate);
  const sr=minFromISO(d.daily.sunrise[idx]), ss=minFromISO(d.daily.sunset[idx]);
  const localMin = state.live ? trackNow().min : state.selHour*60+30;
  const phase=phaseAt(localMin,sr,ss);
  applySky({phase, cloud:w.cloud, precip:w.precip, wind:w.wind, temp:w.temp});
  const r=scoreOf(w); lastScore=r;
  const sc=$("#score"); sc.className="score m-"+r.mood; sc.classList.remove("fade"); void sc.offsetWidth; sc.classList.add("fade");
  sc.innerHTML=`${r.s10.toFixed(1)}<span class="den">/10</span>`;
  $("#tagline").textContent=r.tagline;
  $("#sTemp").textContent=Math.round(w.feels??w.temp)+"°";
  $("#sCond").textContent=r.label;
  $("#sWind").textContent=Math.round(w.wind)+" km/h";
  $("#tLab").textContent = state.live ? t("nowLbl") : pad(state.selHour)+":00";
  $("#place .nm").textContent = state.name;
  $("#stats").classList.add("show");
  setDateLabel(state.selDate);
  if($("#details").classList.contains("open")) openDetails();
  if($("#graph").classList.contains("open")) refreshGraph();
}
function updateScrub(){
  const s=$("#scrub"); if(!state.data){ return; } s.classList.add("show");
  $("#hourRange").value=state.selHour;
  $("#hourLab").textContent = state.live ? t("nowLbl") : pad(state.selHour)+":00";
}
$("#hourRange").addEventListener("input",e=>setHour(+e.target.value));
$("#nowBtn").addEventListener("click",()=>{ setLive(); updateScrub(); buildTimeline(); });

    [t("gusts"), w.gust!=null?Math.round(w.gust)+" km/h":"—"],

/* ============================ timeline ============================ */
function buildTimeline(){
  const d=state.data; if(!d||!d.daily){ return; }
  const days=d.daily.time; const scores=days.map((_,i)=>scoreOf(dayW(d,i)).s10);
  $("#timeline").innerHTML=days.map((ds,i)=>{
    const dt=new Date(ds+"T00:00"); const lab=dt.toLocaleDateString(lang,{day:"numeric",month:"short"});
    const isToday=i===d.todayIdx; const sel=(ds===state.selDate);
    return `<div class="tl-day ${isToday?'today':''} ${sel?'sel':''}" data-i="${i}"><div class="bar" style="height:${6+scores[i]*4}px"></div><div class="d">${isToday?t("nowLbl"):lab}</div></div>`;
  }).join("");
}
function toggleTimeline(){ const tl=$("#timeline"); tl.classList.toggle("open"); if(tl.classList.contains("open")){ buildTimeline(); const sel=tl.querySelector(".tl-day.sel")||tl.querySelector(".tl-day.today"); sel&&sel.scrollIntoView({inline:"center",block:"nearest"}); } }
$("#timeline").addEventListener("click",e=>{ const el=e.target.closest(".tl-day"); if(!el) return; selectDay(+el.dataset.i); });

/* ============================ trends graph ============================ */
function buildGraph(){
  const d=state.data; if(!d||!d.daily) return "";
  const days=d.daily.time, n=days.length;
  const scores=days.map((_,i)=>scoreOf(dayW(d,i)).s10);
  const temps=days.map((_,i)=>(d.daily.temperature_2m_max[i]+d.daily.temperature_2m_min[i])/2);
  const probs=days.map((_,i)=>d.daily.precipitation_probability_max[i]||0);
  const W=720,H=232,L=34,R=708,T=16,B=168;
  const x=i=> L+(R-L)*(n<=1?0:i/(n-1));
  const yS=v=> T+(B-T)*(1-clamp(v/10,0,1));
  const tMin=Math.min(...temps),tMax=Math.max(...temps),tr=(tMax-tMin)||1;
  const yT=v=> T+(B-T)*(1-clamp((v-tMin)/tr,0,1));
  let line="",area=`M${x(0).toFixed(1)} ${B}`,tline="";
  scores.forEach((s,i)=>{ const X=x(i).toFixed(1),Y=yS(s).toFixed(1); line+=(i?"L":"M")+X+" "+Y+" "; area+=` L${X} ${Y}`; });
  area+=` L${x(n-1).toFixed(1)} ${B} Z`;
  temps.forEach((tv,i)=>{ tline+=(i?"L":"M")+x(i).toFixed(1)+" "+yT(tv).toFixed(1)+" "; });
  const bars=probs.map((p,i)=>{ const hh=(p/100)*38; return hh>0.5?`<rect x="${(x(i)-2).toFixed(1)}" y="${(B+34-hh).toFixed(1)}" width="4" height="${hh.toFixed(1)}" fill="rgba(120,160,220,.5)"/>`:""; }).join("");
  const grid=[0,5,10].map(g=>`<line x1="${L}" y1="${yS(g).toFixed(1)}" x2="${R}" y2="${yS(g).toFixed(1)}" stroke="rgba(128,128,128,.18)"/><text x="${L-5}" y="${(yS(g)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="${cssVar('--dim')}">${g}</text>`).join("");
  const step=Math.ceil(n/8);
  const dlabs=days.map((ds,i)=> i%step===0?`<text x="${x(i).toFixed(1)}" y="${B+50}" text-anchor="middle" font-size="8" fill="${cssVar('--dim')}">${new Date(ds+"T00:00").toLocaleDateString(lang,{month:"short",day:"numeric"})}</text>`:"").join("");
  const todayX=x(d.todayIdx).toFixed(1); const selI=days.indexOf(state.selDate);
  let mk=`<line x1="${todayX}" y1="${T}" x2="${todayX}" y2="${B}" stroke="${cssVar('--dim')}" stroke-dasharray="3 3"/>`;
  if(selI>=0) mk+=`<circle cx="${x(selI).toFixed(1)}" cy="${yS(scores[selI]).toFixed(1)}" r="4" fill="rgb(127,176,224)" stroke="#fff" stroke-width="1.5"/>`;
  const hits=days.map((_,i)=>`<rect class="ghit" data-i="${i}" x="${(x(i)-(R-L)/(2*((n-1)||1))).toFixed(1)}" y="${T}" width="${((R-L)/((n-1)||1)).toFixed(1)}" height="${(B-T+40).toFixed(1)}" fill="transparent" style="cursor:pointer"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="auto"><g>${grid}${bars}<path d="${area}" fill="rgba(127,176,224,.16)"/><path d="${tline}" fill="none" stroke="rgba(230,170,90,.85)" stroke-width="1.3"/><path d="${line}" fill="none" stroke="rgb(127,176,224)" stroke-width="2"/>${mk}${dlabs}${hits}</g></svg>`;
}
function cssVar(v){ return getComputedStyle(document.body).getPropertyValue(v)||"#888"; }
function openGraph(){ const p=$("#graph"); p.innerHTML=`<div class="head">${t("trends")} · ${esc(state.name||"")}</div>`
  +`<div class="glegend"><span class="lg b">${t("trackGrip")}</span><span class="lg a">${t("temp")}</span><span class="lg r">${t("precip")}</span></div>`
  +`<div class="gwrap">${buildGraph()}</div>`; p.classList.add("open"); }
function refreshGraph(){ if($("#graph").classList.contains("open")) openGraph(); }
function toggleGraph(){ const p=$("#graph"); if(p.classList.contains("open")) p.classList.remove("open"); else { if(!state.data) return; openGraph(); } }
$("#graph").addEventListener("click",e=>{ const r=e.target.closest(".ghit"); if(r){ selectDay(+r.dataset.i); } });

/* ============================ search: Photon + Overpass ============================ */
let debounce, selIdx=-1, collapsed={tracks:false,places:false};
const inputWrap=$("#inputWrap");
function classifyPhoton(f){ const p=f.properties,[lon,lat]=f.geometry.coordinates;
  const isTrack=(p.osm_key==="sport"&&p.osm_value==="karting")||p.osm_value==="raceway"||(p.osm_key==="leisure"&&p.osm_value==="track")||/\b(kart|karting|kartodrom|circuit|speedway|raceway|motorsport|racetrack)\b/i.test([p.name,p.street].filter(Boolean).join(" "));
  const sub=[p.city||p.county||p.locality||p.state,p.country].filter(Boolean).join(", ");
  return {name:p.name||p.street||p.city||"Unknown",sub,lat,lon,isTrack}; }
async function photon(q,bias){ let u=`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=10&lang=${["en","de","fr"].includes(lang)?lang:"en"}`; if(bias){u+=`&lat=${bias.lat}&lon=${bias.lon}`;} const j=await (await fetch(u)).json(); return (j.features||[]).map(classifyPhoton); }
const OVERPASS_EPS=["https://overpass-api.de/api/interpreter","https://overpass.kumi.systems/api/interpreter","https://maps.mail.ru/osm/tools/overpass/api/interpreter","https://overpass.private.coffee/api/interpreter"];
const opCache=new Map();
async function overpassFetch(ql,ms=10000){
  if(opCache.has(ql)) return opCache.get(ql);
  const lk="gc_op_"+ql.length+"_"+ql.slice(0,40).replace(/\W/g,""); // coarse ls key
  const cached=lsGet(lk); if(cached){ opCache.set(ql,cached); return cached; }
  const data="?data="+encodeURIComponent(ql);
  const attempts=OVERPASS_EPS.map(ep=>{ const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),ms);
    return fetch(ep+data,{signal:ctrl.signal}).then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); }).finally(()=>clearTimeout(to)); });
  const j=await Promise.any(attempts); opCache.set(ql,j); lsSet(lk,j,864e5); return j;
}
async function overpassAround(lat,lon,km=40,limit=25){
  const r=km*1000; const ql=`[out:json][timeout:25];(nwr["sport"="karting"](around:${r},${lat},${lon});nwr["highway"="raceway"](around:${r},${lat},${lon}););out center ${limit};`;
  const j=await overpassFetch(ql);
  return (j.elements||[]).map(el=>{ const tg=el.tags||{}; const la=el.lat??el.center?.lat, lo=el.lon??el.center?.lon; const kart=tg.sport==="karting";
    return {name:tg.name||(kart?"Kart circuit":"Racetrack"),sub:tg["addr:city"]||"",lat:la,lon:lo,isTrack:true,kart}; }).filter(x=>x.lat!=null); }
async function overpassBBox(b,limit=60){
  const ql=`[out:json][timeout:25];(nwr["sport"="karting"](${b.s},${b.w},${b.n},${b.e});nwr["highway"="raceway"](${b.s},${b.w},${b.n},${b.e}););out center ${limit};`;
  const j=await overpassFetch(ql);
  return (j.elements||[]).map(el=>{ const la=el.lat??el.center?.lat, lo=el.lon??el.center?.lon; return {name:el.tags?.name||"Unnamed circuit",lat:la,lon:lo}; }).filter(x=>x.lat!=null); }
function dist(a,b,c,d){ const R=6371,dLat=(c-a)*Math.PI/180,dLon=(d-b)*Math.PI/180,la1=a*Math.PI/180,la2=c*Math.PI/180; const x=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function dedupe(arr){ const seen=new Set(); return arr.filter(x=>{ const k=x.lat.toFixed(3)+","+x.lon.toFixed(3); if(seen.has(k))return false; seen.add(k); return true; }); }
function parseCoords(q){ const m=q.match(/^\s*(-?\d{1,2}(?:\.\d+)?)\s*[, ]\s*(-?\d{1,3}(?:\.\d+)?)\s*$/); if(!m) return null; const la=+m[1],lo=+m[2]; if(Math.abs(la)<=90&&Math.abs(lo)<=180) return {lat:la,lon:lo}; return null; }
function rowHTML(o,withDist,from){ const dd=withDist&&from?` <span class="dist">${dist(from.lat,from.lon,o.lat,o.lon).toFixed(0)} km</span>`:"";
  return `<div class="row" data-lat="${o.lat}" data-lon="${o.lon}" data-name="${esc(o.name)}"><span class="ic">${o.isTrack?'🏁':'◷'}</span><span class="nm">${esc(o.name)}</span>${dd||(o.sub?`<span class="sub">${esc(o.sub)}</span>`:"")}</div>`; }
function section(key,title,items,opts={}){ if(!items.length && !opts.loading) return "";
  const col=collapsed[key]?"collapsed":"";
  return `<div class="secthead ${col}" data-sec="${key}"><span class="tw">▾</span>${title}<span class="cnt">${items.length}</span>${opts.loading?'<span class="mini"></span>':''}</div>`
    +`<div class="sect ${col}" data-sect="${key}">${items.map(o=>rowHTML(o,opts.dist,opts.from)).join("")}</div>`; }
function renderBrowse(){ const rec=recents();
  let h=`<div class="row geo" data-act="geo"><span class="ic">◎</span><span class="nm">${esc(t("nearMe"))}</span></div>`;
  if(rec.length) h+=section("recent",t("recent"),rec.map(r=>({name:r.name,lat:r.lat,lon:r.lon,isTrack:false})));
  h+=section("featured",t("featured"),FEATURED.map(f=>({...f,isTrack:true})));
  $("#sugg").innerHTML=h; selIdx=-1; }
async function doSearch(q){
  const co=parseCoords(q);
  if(co){ $("#sugg").innerHTML=`<div class="secthead">${t("coords")}</div>`+rowHTML({name:`${co.lat.toFixed(4)}, ${co.lon.toFixed(4)}`,lat:co.lat,lon:co.lon,isTrack:true}); return; }
  inputWrap.classList.add("loading");
  let gen=[]; try{ gen=await photon(q); }catch{}
  if($("#q").value.trim()!==q){ inputWrap.classList.remove("loading"); return; }
  let tracks=gen.filter(r=>r.isTrack), places=gen.filter(r=>!r.isTrack);
  const top=places[0]||gen[0];
  paintResults(tracks,places,{trackLoading:!!top});
  inputWrap.classList.remove("loading");
  if(top){
    let near=[]; try{ near=await overpassAround(top.lat,top.lon,40,20); }
    catch{ try{ near=(await photon("karting",top)).map(r=>({...r,isTrack:true})); }catch{} }
    if($("#q").value.trim()!==q) return;
    tracks=dedupe([...tracks,...near]).sort((a,b)=>(b.kart?1:0)-(a.kart?1:0)||dist(top.lat,top.lon,a.lat,a.lon)-dist(top.lat,top.lon,b.lat,b.lon));
    paintResults(tracks,places,{dist:true,from:top});
  }
}
function paintResults(tracks,places,opts){ let h="";
  h+=section("tracks",t("tracks"),tracks,{loading:opts.trackLoading,dist:opts.dist,from:opts.from});
  h+=section("places",t("places"),places,{});
  if(!tracks.length&&!places.length&&!opts.trackLoading) h=`<div class="empty">${t("noMatch")}</div>`;
  $("#sugg").innerHTML=h; selIdx=-1; }
$("#sugg").addEventListener("click",e=>{
  const sh=e.target.closest(".secthead"); if(sh && sh.dataset.sec){ const k=sh.dataset.sec; collapsed[k]=!collapsed[k]; sh.classList.toggle("collapsed"); const sect=$(`.sect[data-sect="${k}"]`); if(sect) sect.classList.toggle("collapsed"); return; }
  const row=e.target.closest(".row"); if(!row) return;
  if(row.dataset.act==="geo") return geolocate();
  closeSearch(); loadPlace(+row.dataset.lat,+row.dataset.lon,row.dataset.name);
});
$("#q").addEventListener("input",e=>{ const v=e.target.value.trim(); inputWrap.classList.toggle("has-val",!!v); clearTimeout(debounce);
  if(v.length<2){ renderBrowse(); inputWrap.classList.remove("loading"); return; }
  debounce=setTimeout(()=>doSearch(v),230); });
$("#q").addEventListener("keydown",e=>{ const rows=[...$("#sugg").querySelectorAll(".row")];
  if(e.key==="ArrowDown"){e.preventDefault();selIdx=Math.min(selIdx+1,rows.length-1);}
  else if(e.key==="ArrowUp"){e.preventDefault();selIdx=Math.max(selIdx-1,0);}
  else if(e.key==="Enter"){e.preventDefault();(rows[selIdx]||rows[0])?.click();return;}
  else return;
  rows.forEach((r,i)=>r.classList.toggle("sel",i===selIdx)); rows[selIdx]?.scrollIntoView({block:"nearest"}); });
$("#clr").addEventListener("click",()=>{ $("#q").value=""; inputWrap.classList.remove("has-val"); renderBrowse(); $("#q").focus(); });

/* ============================ near me (list of options) ============================ */
async function showNearby(lat,lon){
  openSearch(); $("#q").value=""; inputWrap.classList.remove("has-val");
  const myRow=`<div class="row" data-lat="${lat}" data-lon="${lon}" data-name="${esc(t("myLoc"))}"><span class="ic">📍</span><span class="nm">${esc(t("myLoc"))}</span></div>`;
  $("#sugg").innerHTML=myRow+`<div class="secthead" data-sec="tracks"><span class="tw">▾</span>${t("tracks")}<span class="mini"></span></div>`;
  try{ const near=(await overpassAround(lat,lon,60,30)).sort((a,b)=>dist(lat,lon,a.lat,a.lon)-dist(lat,lon,b.lat,b.lon));
    $("#sugg").innerHTML=myRow+section("tracks",t("tracks"),near,{dist:true,from:{lat,lon}}); }
  catch{ $("#sugg").innerHTML=myRow+`<div class="empty">${t("noMatch")}</div>`; }
}
function geolocate(){ if(!navigator.geolocation) return; closeQuick(); $("#place").querySelector(".nm").textContent=t("locating");
  navigator.geolocation.getCurrentPosition(p=>showNearby(p.coords.latitude,p.coords.longitude),()=>{ $("#place").querySelector(".nm").textContent=state.name||t("tapBegin"); }); }

/* ============================ map ============================ */
let map=null, mapLayer=null, mapDebounce, mapView="list";
function ensureMap(){ if(map) return;
  map=L.map("map",{zoomControl:true,attributionControl:true}).setView([state.lat||45.42,state.lon||10.5],10);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19,subdomains:"abcd",attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);
  mapLayer=L.layerGroup().addTo(map);
  map.on("moveend",()=>{ clearTimeout(mapDebounce); mapDebounce=setTimeout(loadMapTracks,450); });
}
async function loadMapTracks(){ if(!map) return; const b=map.getBounds(); if(map.getZoom()<7){ return; }
  const mh=$("#maphint"); mh.classList.add("loading");
  try{ const tracks=await overpassBBox({s:b.getSouth(),w:b.getWest(),n:b.getNorth(),e:b.getEast()},60);
    mapLayer.clearLayers();
    tracks.forEach(tk=>{ const m=L.marker([tk.lat,tk.lon],{icon:L.divIcon({className:"",html:`<div class="mk">🏁</div>`,iconSize:[22,22],iconAnchor:[11,18]})});
      m.bindTooltip(tk.name,{direction:"top"}); m.on("click",()=>{ closeSearch(); loadPlace(tk.lat,tk.lon,tk.name); }); mapLayer.addLayer(m); });
  }catch{} finally{ mh.classList.remove("loading"); }
}
function setView(v){ mapView=v; $("#viewSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("active",b.dataset.v===v));
  $("#panelbody").classList.toggle("mapmode",v==="map");
  if(v==="map"){ ensureMap(); setTimeout(()=>{ map.invalidateSize(); if(state.lat) map.setView([state.lat,state.lon],11); loadMapTracks(); },80); } }
$("#viewSeg").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) setView(b.dataset.v); });

/* ============================ open/close + global handlers ============================ */
function openSearch(){ $("#search").classList.add("open"); $("#q").value=""; inputWrap.classList.remove("has-val","loading"); setView("list"); renderBrowse(); setTimeout(()=>$("#q").focus(),30); closeQuick(); closeDetails(); }
function closeSearch(){ $("#search").classList.remove("open"); }
$("#search").addEventListener("click",e=>{ if(e.target.id==="search") closeSearch(); });
document.addEventListener("keydown",e=>{ if(e.key==="/"&&!$("#search").classList.contains("open")&&document.activeElement.tagName!=="INPUT"){e.preventDefault();openSearch();} if(e.key==="Escape"){closeSearch();closeQuick();closeDetails();closeLang();} });
document.addEventListener("click",e=>{
  const tt=e.target;
  if(tt.closest("#globe")){ $("#lang").classList.contains("open")?closeLang():openLang(); return; }
  if(tt.closest("#lang")){ const row=tt.closest(".row[data-l]"); if(row) setLang(row.dataset.l); return; }
  if(tt.closest("#place")){ $("#quick").classList.contains("open")?closeQuick():openQuick(); return; }
  if(tt.closest("#quick")){ const row=tt.closest(".row"); if(row) quickPick(row); return; }
  if(tt.closest("#condDet")||tt.closest("#blurbDet")){ toggleDetails(); return; }
  if(tt.closest("#tlToggle")){ toggleTimeline(); return; }
  if(tt.closest("#graphToggle")){ toggleGraph(); return; }
  if(tt.closest("#details")||tt.closest("#search")||tt.closest("#timeline")||tt.closest("#graph")) return;
  if(!tt.closest("#quick")) closeQuick();
  if(!tt.closest("#lang")) closeLang();
  if(!tt.closest("#condDet")&&!tt.closest("#blurbDet")) closeDetails();
});
$("#score").addEventListener("click",()=>{ if(!state.data) openSearch(); });

/* ============================ boot ============================ */
applyStaticI18n();
(function boot(){
  applySky({phase:"night",cloud:30,precip:0,wind:6,temp:12});
  let last=null; try{ last=JSON.parse(localStorage.getItem("gc_last")||"null"); if(last&&last.d) last=last.d; }catch{}
  // gc_last stored via lsSet => wrapper {t,ttl,d}
  const lw=lsGet("gc_last");
  if(lw){ loadPlace(lw.lat,lw.lon,lw.name); }
  clockTick();
})();
</script>
